<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>开发辅助工具</title>
    <style>
      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        background: #f4f7fb;
      }

      .boot-loading {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
        font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
        color: #152033;
      }

      .boot-loading__panel {
        display: grid;
        justify-items: center;
        gap: 14px;
      }

      .boot-loading__icon {
        width: 52px;
        height: 52px;
        display: grid;
        place-items: center;
        border-radius: 14px;
        background: linear-gradient(135deg, rgba(47, 128, 237, 0.18), rgba(242, 169, 59, 0.18));
        color: #2f80ed;
        box-shadow: 0 14px 32px rgba(47, 128, 237, 0.16);
      }

      .boot-loading__icon svg {
        width: 28px;
        height: 28px;
      }

      .boot-loading__text {
        font-size: 15px;
        font-weight: 650;
      }

      .boot-loading__bar {
        width: 168px;
        height: 4px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(47, 128, 237, 0.14);
      }

      .boot-loading__bar::before {
        content: "";
        display: block;
        width: 44%;
        height: 100%;
        border-radius: inherit;
        background: #2f80ed;
        animation: boot-loading-slide 1.1s ease-in-out infinite;
      }

      @keyframes boot-loading-slide {
        0% {
          transform: translateX(-110%);
        }

        100% {
          transform: translateX(260%);
        }
      }
    </style>
    <script type="module" src="./assets/index-L16-PhgT.js"></script>
    <link rel="stylesheet" href="./assets/index-BqCSQi4w.css">
  </head>
  <body>
    <div id="app">
      <div class="boot-loading">
        <div class="boot-loading__panel">
          <div class="boot-loading__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M4 10h16v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-9z" />
              <path
                d="M4 10h16V9a2 2 0 0 0-2-2h-1.4a6 6 0 0 0-11.2 0H6a2 2 0 0 0-2 2v1z"
                opacity="0.92"
              />
              <path
                d="M11 14.5h2v2.8h-2z"
                fill="currentColor"
                opacity="0.45"
              />
              <line
                x1="4"
                y1="10"
                x2="20"
                y2="10"
                stroke="currentColor"
                stroke-opacity="0.28"
                stroke-width="0.9"
              />
            </svg>
          </div>
          <div class="boot-loading__text">开发辅助工具正在启动</div>
          <div class="boot-loading__bar"></div>
        </div>
      </div>
    </div>
  </body>
</html>
